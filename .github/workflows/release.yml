name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -m py_compile gog_downloader.py
        python -m py_compile get_token.py
        python -m py_compile test_tool.py
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
        draft: false
        prerelease: false
        body: |
          ## Installation
          
          ### Option 1: Via pip (recommended)
          ```bash
          pip install easy-gog-downloader
          gog-get-token
          gog-downloader --list
          ```
          
          ### Option 2: From Source
          Download the source code archive below and extract it:
          ```bash
          pip install -r requirements.txt
          python3 get_token.py
          python3 gog_downloader.py --list
          ```
          
          See [README.md](https://github.com/zGLados/easy-GOG-downloader/blob/main/README.md) for full documentation.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
